name: Build

on:
  push:
    tags:
      - "v*"        # запускается при git tag v1.0.0
  workflow_dispatch: # ручной запуск из интерфейса GitHub

permissions:
  contents: write 

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Generate ICNS icon (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p logo.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size app/assets/logo.png --out logo.iconset/icon_${size}x${size}.png
          done
          iconutil -c icns logo.iconset -o app/assets/logo.icns

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name "VK-Poll-Tracker-${{ matrix.name }}" \
            --add-data "app/assets:assets" \
            --collect-all pydantic_settings \
            --hidden-import "keyring.backends" \
            --hidden-import "PyQt6.QtSvg" \
            app/gui.py

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name "VK-Poll-Tracker-${{ matrix.name }}" \
            --add-data "app/assets:assets" \
            --icon "app/assets/logo.icns" \
            --collect-all pydantic_settings \
            --hidden-import "keyring.backends" \
            --hidden-import "PyQt6.QtSvg" \
            app/gui.py

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "VK-Poll-Tracker-${{ matrix.name }}" `
            --add-data "app/assets;assets" `
            --icon "app/assets/logo.ico" `
            --collect-all pydantic_settings `
            --hidden-import "keyring.backends" `
            --hidden-import "PyQt6.QtSvg" `
            app/gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    # запускается только при пуше тега, после успешной сборки всех платформ
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            ## Скачать

            | Платформа | Файл |
            |-----------|------|
            | 🐧 Linux | `VK-Poll-Tracker-linux` |
            | 🪟 Windows | `VK-Poll-Tracker-windows.exe` |
            | 🍎 macOS | `VK-Poll-Tracker-macos` |

            > **Linux / macOS:** после скачивания выдать права на запуск:
            > ```
            > chmod +x VK-Poll-Tracker-*
            > ```
