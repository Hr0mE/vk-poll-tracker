name: Build

on:
  push:
    tags:
      - "v*"        # запускается при git tag v1.0.0
  workflow_dispatch: # ручной запуск из интерфейса GitHub

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name "VK Poll Tracker" \
            --collect-all pydantic_settings \
            --hidden-import "keyring.backends" \
            app/gui.py

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "VK Poll Tracker" `
            --collect-all pydantic_settings `
            --hidden-import "keyring.backends" `
            app/gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    # запускается только при пуше тега, после успешной сборки всех платформ
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
